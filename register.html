<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Pre-Initiate Registration</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap"
rel="stylesheet">

</head>

<body class="gateway-body">

<div class="gateway-container">

<h1>PRE-INITIATE REGISTRATION</h1>

<p class="gateway-warning">

H.U.N.T.R.E.S.S NETWORK ACCESS REQUIRES
IDENTITY INITIALIZATION.

</p>

<input
type="text"
placeholder="ENTER USERNAME"
class="gateway-input">

<input
type="email"
placeholder="ENTER EMAIL"
class="gateway-input">

<div class="gateway-buttons">

<button
type="button"
class="gateway-btn"
onclick="window.location.href='main.html'">

INITIALIZE ACCESS

</button>

</div>

</div>

</body>

</html>
