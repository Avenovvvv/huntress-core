<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>H.U.N.T.R.E.S.S Registration</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap"
rel="stylesheet">

</head>

<body class="gateway-body">

<!-- MATRIX -->

<canvas id="matrix"></canvas>

<!-- REGISTER -->

<div class="gateway-container">

<div class="intel-label">
PRE-INITIATE REGISTRATION
</div>

<h1>
IDENTITY INITIALIZATION
</h1>

<p class="gateway-warning">

H.U.N.T.R.E.S.S network access
requires operative initialization.

<br><br>

All registered users are assigned
a temporary operative designation.

</p>

<input
type="email"
placeholder="ENTER EMAIL"
class="gateway-input">

<input
type="password"
placeholder="ENTER PASSWORD"
class="gateway-input">

<div class="gateway-buttons">

<button
type="button"
class="gateway-btn"
onclick="generateHunterID()">

INITIALIZE ACCESS

</button>

</div>

<div
id="generated-id"
class="hunter-id">

</div>

</div>

<script>

function generateHunterID() {

const randomNum =
Math.floor(100 + Math.random() * 900);

const hunterID =
"HUNTER_" + randomNum;

document.getElementById(
"generated-id"
).innerHTML = `

ACCESS GRANTED
<br><br>
ASSIGNED OPERATIVE ID:
<br>
<span style="color:#00ff88;">
${hunterID}
</span>

`;

setTimeout(() => {

window.location.href =
"dashboard.html";

}, 2500);

}

</script>

<script src="script.js"></script>

</body>

</html>
