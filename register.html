<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Pre-Initiate Registration</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap"
rel="stylesheet">

</head>

<body class="gateway-body">

<div class="gateway-container">

    <h1>PRE-INITIATE<br>REGISTRATION</h1>

    <p class="gateway-warning">

        H.U.N.T.R.E.S.S NETWORK ACCESS REQUIRES
        IDENTITY INITIALIZATION.

    </p>

    <input
    type="email"
    placeholder="ENTER EMAIL"
    class="gateway-input">

    <input
    type="password"
    placeholder="ENTER PASSWORD"
    class="gateway-input">

    <div class="gateway-buttons">

        <button
        type="button"
        class="gateway-btn"
        onclick="generateHunterID()">

        INITIALIZE ACCESS

        </button>

    </div>

    <p id="generated-id" class="hunter-id"></p>

</div>

<script>

function generateHunterID() {

    const randomNum =
    Math.floor(100 + Math.random() * 900);

    const hunterID =
    "hunter_" + randomNum;

    document.getElementById("generated-id")
    .innerText =
    "ASSIGNED OPERATIVE ID: " + hunterID;

}

</script>

</body>
</html>
