<body class="gateway-body">

    <div class="gateway-container">

        <h1>ACCESS GATEWAY</h1>

        <p class="gateway-warning">

            UNAUTHORIZED ACCESS TO RESTRICTED

        </p>

        <div class="gateway-buttons">

            <button id="guestBtn">

                CONTINUE AS GUEST

            </button>

            <button id="accountBtn">

                CREATE PRE-INITIATE ACCOUNT

            </button>

        </div>

        <div class="clearance-box">

            <p>LEVEL 0 — GUEST</p>

            <p>LIMITED NETWORK ACCESS</p>

            <p>CLASSIFIED FILES REDACTED</p>

        </div>

    </div>

<script src="script.js"></script>
