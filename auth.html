<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>H.U.N.T.R.E.S.S AUTH</title>

<link rel="stylesheet" href="style.css">
  <input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="loginSystem()">

LOGIN

</button>

<style>

.auth-body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;
}

.auth-box{

width:100%;

max-width:450px;

padding:45px 30px;

background:rgba(0,0,0,0.85);

border:1px solid rgba(0,255,136,0.15);

border-radius:24px;

backdrop-filter:blur(12px);
}

.auth-box h1{

font-size:42px;

color:#00ff88;

margin-bottom:10px;

letter-spacing:4px;

text-align:center;
}

.auth-box p{

text-align:center;

color:#bdbdbd;

margin-bottom:35px;

letter-spacing:2px;
}

.auth-tabs{

display:flex;

gap:10px;

margin-bottom:25px;
}

.auth-tabs button{

flex:1;
}

.auth-form{

display:flex;

flex-direction:column;

gap:18px;
}

.auth-form input{

padding:16px;

border-radius:12px;

border:1px solid rgba(0,255,136,0.15);

background:black;

color:white;

font-family:'Orbitron',sans-serif;

outline:none;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="gateway-overlay"></div>

<div class="auth-body">

<div class="auth-box">

<h1>H.U.N.T.R.E.S.S</h1>

<p>INITIATE AUTHENTICATION</p>

<div class="auth-tabs">

<button onclick="showLogin()">SIGN IN</button>

<button onclick="showSignup()">SIGN UP</button>

</div>

<!-- LOGIN -->

<form id="loginForm" class="auth-form">

<input type="email" placeholder="EMAIL" required>

<input type="password" placeholder="PASSWORD" required>

<button type="submit">ACCESS NETWORK</button>

</form>

<!-- SIGNUP -->

<form id="signupForm" class="auth-form hidden">

<input type="text" placeholder="INITIATE NAME" required>

<input type="email" placeholder="EMAIL" required>

<input type="password" placeholder="PASSWORD" required>

<button type="submit">CREATE ACCOUNT</button>

</form>

</div>

</div>

<script>

function showLogin(){

document.getElementById("loginForm").classList.remove("hidden");

document.getElementById("signupForm").classList.add("hidden");

}

function showSignup(){

document.getElementById("signupForm").classList.remove("hidden");

document.getElementById("loginForm").classList.add("hidden");

}

/* temporary redirect */

document.getElementById("loginForm").addEventListener("submit", function(e){

e.preventDefault();

window.location.href = "/gateway";

});

document.getElementById("signupForm").addEventListener("submit", function(e){

e.preventDefault();

window.location.href = "/gateway";

});
  

</script>
<script>

function loginSystem(){

const username =
document.getElementById("username").value;

const password =
document.getElementById("password").value;

if(
username === "controller" &&
password === "reznov"
){

window.location.href = "main.html";

}

else{

alert("ACCESS DENIED");

}

}

</script>
</body>
</html>
