<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>H.U.N.T.R.E.S.S AUTH</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
font-family:'Orbitron',sans-serif;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

.auth-body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
position:relative;
z-index:2;
}

.auth-box{
width:100%;
max-width:500px;
padding:45px 30px;
background:rgba(0,0,0,0.92);
border:1px solid rgba(0,255,136,0.15);
border-radius:24px;
backdrop-filter:blur(10px);
}

.auth-box h1{
font-size:42px;
color:#00ff88;
text-align:center;
letter-spacing:5px;
margin-bottom:10px;
}

.auth-box p{
text-align:center;
color:#aaa;
margin-bottom:35px;
letter-spacing:2px;
}

.auth-tabs{
display:flex;
gap:10px;
margin-bottom:25px;
}

.auth-tabs button{
flex:1;
padding:16px;
border:none;
border-radius:12px;
font-family:'Orbitron',sans-serif;
font-size:14px;
cursor:pointer;
font-weight:bold;
}

.green-btn{
background:#00ff88;
color:black;
}

.red-btn{
background:#ff003c;
color:white;
}

.auth-form{
display:flex;
flex-direction:column;
gap:18px;
}

.auth-form input{
padding:16px;
border-radius:12px;
border:1px solid rgba(0,255,136,0.15);
background:black;
color:white;
font-family:'Orbitron',sans-serif;
outline:none;
}

.auth-form button{
padding:18px;
border:none;
border-radius:12px;
background:#00ff88;
font-family:'Orbitron',sans-serif;
font-weight:bold;
cursor:pointer;
font-size:15px;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="auth-body">

<div class="auth-box">

<h1>H.U.N.T.R.E.S.S</h1>

<p>INITIATE AUTHENTICATION</p>

<div class="auth-tabs">

<button onclick="showLogin()" class="green-btn">
LOGIN
</button>

<button onclick="showSignup()" class="green-btn">
JOIN HUNTRESS
</button>

<button onclick="showAdmin()" class="red-btn">
CONTROLLER
</button>

</div>

<!-- LOGIN -->

<form id="loginForm" class="auth-form">

<input
type="email"
id="loginEmail"
placeholder="EMAIL"
required>

<input
type="password"
id="loginPassword"
placeholder="PASSWORD"
required>

<button type="submit">
LOGIN TO ACCOUNT
</button>

</form>

<!-- SIGNUP -->

<form id="signupForm" class="auth-form hidden">

<input
type="text"
placeholder="INITIATE NAME"
required>

<input
type="email"
id="signupEmail"
placeholder="EMAIL"
required>

<input
type="password"
id="signupPassword"
placeholder="PASSWORD"
required>

<button type="submit">
CREATE ACCOUNT
</button>

</form>

<!-- ADMIN -->

<form id="adminForm" class="auth-form hidden">

<input
type="text"
id="adminUser"
placeholder="CONTROLLER USERNAME"
required>

<input
type="password"
id="adminPass"
placeholder="CONTROLLER PASSWORD"
required>

<button type="submit" class="red-btn">
ACCESS CONTROLLER
</button>

</form>

</div>

</div>

<script type="module">

import {
initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyCZTz2K9TV7p1G2CHonsf9khw_cghJtJxo",

authDomain: "huntress-core.firebaseapp.com",

projectId: "huntress-core",

storageBucket: "huntress-core.firebasestorage.app",

messagingSenderId: "136366574004",

appId: "1:136366574004:web:37d9f25270987288190ae1"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

/* TAB SWITCHING */

window.showLogin = function(){

document.getElementById("loginForm").classList.remove("hidden");

document.getElementById("signupForm").classList.add("hidden");

document.getElementById("adminForm").classList.add("hidden");

}

window.showSignup = function(){

document.getElementById("signupForm").classList.remove("hidden");

document.getElementById("loginForm").classList.add("hidden");

document.getElementById("adminForm").classList.add("hidden");

}

window.showAdmin = function(){

document.getElementById("adminForm").classList.remove("hidden");

document.getElementById("loginForm").classList.add("hidden");

document.getElementById("signupForm").classList.add("hidden");

}

/* SIGNUP */

document.getElementById("signupForm")
.addEventListener("submit", async (e)=>{

e.preventDefault();

const email =
document.getElementById("signupEmail").value;

const password =
document.getElementById("signupPassword").value;

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

alert("ACCOUNT CREATED");

window.location.href = "dashboard.html";

}catch(error){

alert(error.message);

}

});

/* LOGIN */

document.getElementById("loginForm")
.addEventListener("submit", async (e)=>{

e.preventDefault();

const email =
document.getElementById("loginEmail").value;

const password =
document.getElementById("loginPassword").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("ACCESS GRANTED");

window.location.href = "dashboard.html";

}catch(error){

alert(error.message);

}

});

/* CONTROLLER LOGIN */

document.getElementById("adminForm")
.addEventListener("submit", function(e){

e.preventDefault();

const user =
document.getElementById("adminUser").value;

const pass =
document.getElementById("adminPass").value;

if(
user === "controller" &&
pass === "reznov"
){

window.location.href = "dashboard.html";

}else{

alert("ACCESS DENIED");

}

});

</script>

<script>

const canvas = document.getElementById("matrix");

const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;

canvas.width = window.innerWidth;

const letters = "01HUNTRESSREZNOV";

const matrix = letters.split("");

const fontSize = 14;

const columns = canvas.width/fontSize;

const drops = [];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle = "rgba(0,0,0,0.05)";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle="#ff003c";

ctx.font = fontSize + "px monospace";

for(let i=0;i<drops.length;i++){

const text =
matrix[Math.floor(Math.random()*matrix.length)];

ctx.fillText(
text,
i*fontSize,
drops[i]*fontSize
);

if(
drops[i]*fontSize > canvas.height &&
Math.random() > 0.975
){
drops[i]=0;
}

drops[i]++;

}

}

setInterval(draw,35);

</script>

</body>

</html>
