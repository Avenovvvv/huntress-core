<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>H.U.N.T.R.E.S.S AUTH</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap"
rel="stylesheet">

<style>

.auth-body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;
}

.auth-box{

width:100%;

max-width:500px;

padding:45px 30px;

background:rgba(0,0,0,0.88);

border:1px solid rgba(0,255,136,0.15);

border-radius:24px;

backdrop-filter:blur(12px);
}

.auth-box h1{

font-size:42px;

color:#00ff88;

margin-bottom:10px;

letter-spacing:4px;

text-align:center;
}

.auth-box p{

text-align:center;

color:#bdbdbd;

margin-bottom:35px;

letter-spacing:2px;
}

.auth-tabs{

display:flex;

gap:10px;

margin-bottom:25px;

flex-wrap:wrap;
}

.auth-tabs button{

flex:1;
}

.auth-form{

display:flex;

flex-direction:column;

gap:18px;
}

.auth-form input{

padding:16px;

border-radius:12px;

border:1px solid rgba(0,255,136,0.15);

background:black;

color:white;

font-family:'Orbitron',sans-serif;

outline:none;
}

.hidden{
display:none;
}

.admin-btn{

background:#ff003c !important;

color:white !important;
}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="gateway-overlay"></div>

<div class="auth-body">

<div class="auth-box">

<h1>H.U.N.T.R.E.S.S</h1>

<p>INITIATE AUTHENTICATION</p>

<div class="auth-tabs">

<button onclick="showLogin()">

SIGN IN

</button>

<button onclick="showSignup()">

SIGN UP

</button>

<button
onclick="showAdmin()"
class="admin-btn">

ADMIN LOGIN

</button>

</div>

<!-- LOGIN -->

<form id="loginForm" class="auth-form">

<input
type="email"
placeholder="EMAIL"
required>

<input
type="password"
placeholder="PASSWORD"
required>

<button type="submit">

ACCESS NETWORK

</button>

</form>

<!-- SIGNUP -->

<form id="signupForm"
class="auth-form hidden">

<input
type="text"
placeholder="INITIATE NAME"
required>

<input
type="email"
placeholder="EMAIL"
required>

<input
type="password"
placeholder="PASSWORD"
required>

<button type="submit">

CREATE ACCOUNT

</button>

</form>

<!-- ADMIN -->

<div
id="adminForm"
class="auth-form hidden">

<input
type="text"
id="adminUser"
placeholder="CONTROLLER USERNAME">

<input
type="password"
id="adminPass"
placeholder="CONTROLLER PASSWORD">

<button
onclick="loginSystem()"
class="admin-btn">

ACCESS CONTROLLER PANEL

</button>

</div>

</div>

</div>

<script type="module">

import { auth } from "./firebase-config.js";

import {

createUserWithEmailAndPassword,
signInWithEmailAndPassword

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* LOGIN TAB */

window.showLogin = function(){

document.getElementById("loginForm")
.classList.remove("hidden");

document.getElementById("signupForm")
.classList.add("hidden");

document.getElementById("adminForm")
.classList.add("hidden");

}

/* SIGNUP TAB */

window.showSignup = function(){

document.getElementById("signupForm")
.classList.remove("hidden");

document.getElementById("loginForm")
.classList.add("hidden");

document.getElementById("adminForm")
.classList.add("hidden");

}

/* ADMIN TAB */

window.showAdmin = function(){

document.getElementById("adminForm")
.classList.remove("hidden");

document.getElementById("loginForm")
.classList.add("hidden");

document.getElementById("signupForm")
.classList.add("hidden");

}

/* LOGIN */

document.getElementById("loginForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const email =
document.querySelector(
"#loginForm input[type='email']"
).value;

const password =
document.querySelector(
"#loginForm input[type='password']"
).value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

window.location.href = "/gateway";

}catch(error){

alert(error.message);

}

});

/* SIGNUP */

document.getElementById("signupForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const email =
document.querySelector(
"#signupForm input[type='email']"
).value;

const password =
document.querySelector(
"#signupForm input[type='password']"
).value;

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

window.location.href = "/gateway";

}catch(error){

alert(error.message);

}

});

/* ADMIN LOGIN */

window.loginSystem = function(){

const username =
document.getElementById("adminUser").value;

const password =
document.getElementById("adminPass").value;

if(
username === "controller" &&
password === "reznov"
){

window.location.href = "/gateway";

}else{

alert("ACCESS DENIED");

}

}

</script>

</html>
