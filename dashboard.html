<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H.U.N.T.R.E.S.S | C2_CONSOLE</title>
    <!-- Firewall: Security Handshake -->
    <script>
        if(localStorage.getItem('huntress_clearance') !== 'GRANTED') {
            window.location.href = 'login.html';
        }
    </script>
    <link rel="stylesheet" href="style.css?v=1.1">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        body { background: #030303; color: #00ff88; font-family: 'Courier Prime', monospace; margin: 0; overflow: hidden; }
        .c2-console { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; padding: 20px; z-index: 10; display: flex; flex-direction: column; }
        .console-header { border-bottom: 1px solid #00ff88; padding-bottom: 10px; display: flex; justify-content: space-between; font-size: 14px; }
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; gap: 20px; height: 90vh; padding-top: 20px; }
        .widget { background: rgba(0, 0, 0, 0.85); border: 1px solid #00ff88; padding: 15px; display: flex; flex-direction: column; overflow: hidden; }
        .widget-header { background: #00ff88; color: #000; font-weight: bold; padding: 5px; margin-bottom: 10px; font-size: 12px; }
        #terminalOutput { flex-grow: 1; overflow-y: auto; font-size: 13px; margin-bottom: 10px; }
        .terminal-input { background: transparent; border: none; border-top: 1px solid #00ff88; color: #00ff88; padding: 10px; font-family: 'Courier Prime', monospace; outline: none; }
        .log-content { font-size: 12px; opacity: 0.8; }
    </style>
</head>

<body>
    <canvas id="matrix"></canvas>

    <div class="c2-console">
        <header class="console-header">
            <span>[ SYSTEM_CONSOLE_ACTIVE ]</span>
            <span>CLEARANCE: OMEGA</span>
            <span id="clock">00:00:00</span>
        </header>

        <div class="dashboard-grid">
            <!-- TERMINAL MODULE -->
            <div class="widget terminal-widget">
                <div class="widget-header">UPLINK_CONSOLE</div>
                <div id="terminalOutput">
                    <p>> HANDSHAKE ESTABLISHED...</p>
                    <p>> AUTHENTICATION SUCCESSFUL...</p>
                </div>
                <input type="text" id="terminalInput" class="terminal-input" placeholder=">_">
            </div>

            <!-- STATUS MODULE -->
            <div class="widget status-widget">
                <div class="widget-header">SYSTEM_STATUS</div>
                <div class="log-content">
                    <p>LATENCY: 12ms</p>
                    <p>THREAT: DEFCON 3</p>
                    <p>NODE_STATUS: ACTIVE</p>
                </div>
            </div>

            <!-- LOG MODULE -->
            <div class="widget log-widget" style="grid-column: span 2;">
                <div class="widget-header">ACTIVE_RELAYS</div>
                <div class="log-content">
                    <p>> READY TO INITIATE MAPPING...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js?v=1.1"></script>
    <script>
        // Clock Function
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
